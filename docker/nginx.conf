# Nginx reverse proxy for LeadForge Agent API
# Place at /etc/nginx/sites-available/leadforge on your Vultr VM
# Enable: ln -s /etc/nginx/sites-available/leadforge /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name YOUR_VULTR_IP;  # Replace with your IP or domain

    # SSE needs special proxy settings — no buffering
    location /api/agent/stream/ {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;           # CRITICAL for SSE
        proxy_cache        off;           # CRITICAL for SSE
        proxy_read_timeout 3600s;         # Keep SSE connection alive for 1 hour
        chunked_transfer_encoding on;
    }

    # All other API routes
    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
